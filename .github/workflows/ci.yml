name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: Build & Lint (${{ matrix.worker }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [worker-user, worker-event, worker-post, worker-social]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn Cache Directory
        id: yarn-cache-dir-path
        working-directory: ${{ matrix.worker }}
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ matrix.worker }}-${{ hashFiles(format('{0}/yarn.lock', matrix.worker)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ matrix.worker }}-
      
      - name: Install dependencies
        working-directory: ${{ matrix.worker }}
        run: yarn install

      - name: Lint
        working-directory: ${{ matrix.worker }}
        run: yarn lint

      - name: Build
        working-directory: ${{ matrix.worker }}
        run: yarn build

      - name: Checkout ci-tools
        if: matrix.worker == 'worker-event'
        uses: actions/checkout@v4
        with:
          repository: Volontariapp/ci-tools
          path: ci-tools
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Setup Database for integration tests
        if: matrix.worker == 'worker-event'
        working-directory: ci-tools
        run: |
          docker compose up -d postgres-event redis
          # Wait for database to be ready
          until docker compose exec -T postgres-event pg_isready -U user -d ms_event; do
            echo "Waiting for postgres-event..."
            sleep 2
          done

      - name: Run Integration Tests
        if: matrix.worker == 'worker-event'
        working-directory: ${{ matrix.worker }}
        run: yarn test:integration --runInBand

  deploy:
    name: Update Deploy Submodule & Configs
    runs-on: ubuntu-latest
    needs: [check, docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Update Deploy Submodule and Images
        uses: Volontariapp/ci-tools/.github/actions/update-deploy@main
        with:
          service: "workers-runners"
          sha: "${{ github.sha }}"
          org-repo-token: ${{ secrets.ORG_REPO_TOKEN }}
          image-match: 'ghcr.io/volontariapp/worker-[^:]+'

  docker:
    name: Build & Push Docker Image (${{ matrix.worker }})
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        worker: [worker-user, worker-event, worker-post, worker-social]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.worker }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
          flavor: |
            latest=false

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.worker }}
          file: ./${{ matrix.worker }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
