name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker-user:
              - 'worker-user/**'
              - '.github/workflows/ci.yml'
            worker-event:
              - 'worker-event/**'
              - '.github/workflows/ci.yml'
            worker-post:
              - 'worker-post/**'
              - '.github/workflows/ci.yml'
            worker-social:
              - 'worker-social/**'
              - '.github/workflows/ci.yml'

  check:
    name: Build & Lint (${{ matrix.worker }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workers != '[]'
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.changes.outputs.workers) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn Cache Directory
        id: yarn-cache-dir-path
        working-directory: ${{ matrix.worker }}
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ matrix.worker }}-${{ hashFiles(format('{0}/yarn.lock', matrix.worker)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ matrix.worker }}-
      
      - name: Install dependencies
        working-directory: ${{ matrix.worker }}
        run: yarn install

      - name: Lint
        working-directory: ${{ matrix.worker }}
        run: yarn lint

      - name: Build
        working-directory: ${{ matrix.worker }}
        run: yarn build

  docker:
    name: Build & Push Docker Image (${{ matrix.worker }})
    runs-on: ubuntu-latest
    needs: [changes, check]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.workers != '[]'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJSON(needs.changes.outputs.workers) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.worker }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
          flavor: |
            latest=false

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.worker }}
          file: ./${{ matrix.worker }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Update Deploy Submodule
    runs-on: ubuntu-latest
    needs: [changes, docker]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.workers != '[]'
    steps:
      - name: Generate Image List
        id: images
        run: |
          WORKERS='${{ needs.changes.outputs.workers }}'
          IMAGES=$(echo "$WORKERS" | jq -r 'map("ghcr.io/volontariapp/" + .) | join(",")')
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

      - name: Update Deploy Submodule and Images
        uses: Volontariapp/ci-tools/.github/actions/update-deploy@main
        with:
          service: "workers-runners"
          sha: "${{ github.sha }}"
          org-repo-token: ${{ secrets.ORG_REPO_TOKEN }}
          image-match: ${{ steps.images.outputs.images }}
