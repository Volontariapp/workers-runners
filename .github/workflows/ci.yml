name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: Build & Lint (${{ matrix.worker }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [worker-user, worker-event, worker-post, worker-social]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn Cache Directory
        id: yarn-cache-dir-path
        working-directory: ${{ matrix.worker }}
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ matrix.worker }}-${{ hashFiles(format('{0}/yarn.lock', matrix.worker)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ matrix.worker }}-
      
      - name: Install dependencies
        working-directory: ${{ matrix.worker }}
        run: yarn install

      - name: Lint
        working-directory: ${{ matrix.worker }}
        run: yarn lint

      - name: Build
        working-directory: ${{ matrix.worker }}
        run: yarn build

      - name: Checkout ci-tools
        if: matrix.worker == 'worker-event'
        uses: actions/checkout@v4
        with:
          repository: Volontariapp/ci-tools
          path: ci-tools
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - name: Setup Database for integration tests
        if: matrix.worker == 'worker-event'
        working-directory: ci-tools
        run: |
          docker compose up -d postgres-event redis
          # Wait for database to be ready
          until docker compose exec -T postgres-event pg_isready -U user -d ms_event; do
            echo "Waiting for postgres-event..."
            sleep 2
          done

      - name: Run Integration Tests
        if: matrix.worker == 'worker-event'
        working-directory: ${{ matrix.worker }}
        run: yarn test:integration --runInBand

  deploy:
    name: Update Deploy Submodule & Configs
    runs-on: ubuntu-latest
    needs: [check, docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v4
        with:
          repository: Volontariapp/deploy
          token: ${{ secrets.ORG_REPO_TOKEN }}
          path: deploy

      - name: Update submodule, deployment images, and ArgoCD configs
        env:
          ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
          SERVICE: "workers-runners"
          SERVICE_SHA: "${{ github.sha }}"
        run: |
          cd deploy
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${ORG_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"
          
          git submodule update --init "submodules/$SERVICE"
          git -C "submodules/$SERVICE" fetch origin "$SERVICE_SHA"
          git -C "submodules/$SERVICE" checkout "$SERVICE_SHA"
          
          SERVICE_SHA_SHORT="${SERVICE_SHA:0:7}"
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          WORKERS=("worker-user" "worker-event" "worker-post" "worker-social")
          UPDATED_FILES=()
          
          for worker in "${WORKERS[@]}"; do
            svc_name="${worker#worker-}"
            
            DEPLOYMENT_FILE="apps/base/ms-${svc_name}/deployment-worker.yaml"
            IMAGE_NAME="ghcr.io/${REPO_OWNER_LOWER}/${worker}:sha-${SERVICE_SHA_SHORT}"
            
            if [ -f "$DEPLOYMENT_FILE" ]; then
              echo "Updating container image in $DEPLOYMENT_FILE to $IMAGE_NAME..."
              yq eval '.spec.template.spec.containers[0].image = env(IMAGE_NAME)' -i "$DEPLOYMENT_FILE"
              UPDATED_FILES+=("$DEPLOYMENT_FILE")
            else
              echo "Deployment file $DEPLOYMENT_FILE not found!"
            fi
            
            export SERVICE_SHA
            for env_name in dev prod; do
              YAML_FILE="infrastructure/argocd/apps/${env_name}/ms-${svc_name}.yaml"
              if [ -f "$YAML_FILE" ]; then
                echo "Updating targetRevision in $YAML_FILE to $SERVICE_SHA..."
                yq eval '.spec.source.targetRevision = env(SERVICE_SHA)' -i "$YAML_FILE"
                UPDATED_FILES+=("$YAML_FILE")
              else
                echo "ArgoCD app file $YAML_FILE not found!"
              fi
            done
          done
          
          if ! git diff --quiet "submodules/$SERVICE"; then
            git add "submodules/$SERVICE"
          fi
          
          for file in "${UPDATED_FILES[@]}"; do
            if ! git diff --quiet "$file"; then
              git add "$file"
            fi
          done
          
          if ! git diff --cached --quiet; then
            git commit -m "chore(deploy): update $SERVICE submodule, deployment images, and ArgoCD configs to ${SERVICE_SHA_SHORT}"
            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break || {
                if [ $i -eq 5 ]; then
                  echo "Max retries reached. Push to deploy repository failed."
                  exit 1
                fi
                echo "Concurrency detected on deploy repository. Retrying in $((i * 2)) seconds (attempt $i/5)..."
                sleep $((i * 2))
              }
            done
          else
            echo "No deploy changes for $SERVICE"
          fi

  docker:
    name: Build & Push Docker Image (${{ matrix.worker }})
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        worker: [worker-user, worker-event, worker-post, worker-social]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.worker }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
          flavor: |
            latest=false

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.worker }}
          file: ./${{ matrix.worker }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
