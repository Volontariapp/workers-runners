name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: Build & Lint (${{ matrix.worker }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [worker-user, worker-event, worker-post, worker-social]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn Cache Directory
        id: yarn-cache-dir-path
        working-directory: ${{ matrix.worker }}
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ matrix.worker }}-${{ hashFiles(format('{0}/yarn.lock', matrix.worker)) }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ matrix.worker }}-
      
      - name: Install dependencies
        working-directory: ${{ matrix.worker }}
        run: yarn install

      - name: Lint
        working-directory: ${{ matrix.worker }}
        run: yarn lint

      - name: Build
        working-directory: ${{ matrix.worker }}
        run: yarn build

  deploy:
    name: Update Deploy Submodule
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Deploy Repository
        uses: actions/checkout@v4
        with:
          repository: Volontariapp/deploy
          token: ${{ secrets.ORG_REPO_TOKEN }}
          path: deploy

      - name: Update submodule
        env:
          ORG_REPO_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
          SERVICE: "workers-runners"
          SERVICE_SHA: "${{ github.sha }}"
        run: |
          cd deploy
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${ORG_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"
          
          git submodule update --init "$SERVICE"
          git -C "$SERVICE" fetch origin "$SERVICE_SHA"
          git -C "$SERVICE" checkout "$SERVICE_SHA"
          
          if ! git diff --quiet "$SERVICE"; then
            git add "$SERVICE"
            git commit -m "chore(deploy): update $SERVICE submodule to ${SERVICE_SHA:0:7}"
            git pull --rebase origin main && git push origin main
          else
            echo "No changes to deploy"
          fi
